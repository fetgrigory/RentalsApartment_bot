version: '3.12'

services:
  django:
    build: .
    command: uv run python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env
    volumes:
      - .:/app
      - venv:/app/.venv
    ports:
      - "8000:8000"
    depends_on:
      - db

  bot:
    build: .
    command: uv run python start_bot.py
    env_file:
      - .env
    volumes:
      - .:/app
      - venv:/app/.venv
    depends_on:
      - db
      - ollama

  db:
    image: pgvector/pgvector:pg18
    container_name: pgvector-container
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DBNAME}
      POSTGRES_USER: ${USER}
      POSTGRES_PASSWORD: ${PASSWORD}
    ports:
      - "${PORT}:5432"
    volumes:
      - pg_data:/var/lib/postgresql
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin-container
    environment:
      PGADMIN_DEFAULT_EMAIL: user@domain.com
      PGADMIN_DEFAULT_PASSWORD: password
    ports:
      - "5050:80"
    depends_on:
      - db
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.17.4
    container_name: ollama
    volumes:
      - ollama:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

volumes:
  pg_data:
  ollama:
  venv: